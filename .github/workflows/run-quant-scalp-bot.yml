name: Run QuantScalpBot

on:
  workflow_dispatch:
    inputs:
      duration_minutes:
        description: "How long to keep the bot running (max 355 minutes on GitHub-hosted runners)"
        required: true
        default: "350"

concurrency:
  group: quant-scalp-bot
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      LLM_KEY: ${{ secrets.LLM_KEY }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "quant_scalp_bot/requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r quant_scalp_bot/requirements.txt

      - name: Validate required secrets
        run: |
          if [ -z "$TELEGRAM_TOKEN" ]; then
            echo "TELEGRAM_TOKEN repository secret is required."
            exit 1
          fi
          if [ -z "$LLM_KEY" ]; then
            echo "LLM_KEY repository secret is required."
            exit 1
          fi

      - name: Run bot
        env:
          DURATION_MINUTES: ${{ inputs.duration_minutes }}
        run: |
          if ! [[ "$DURATION_MINUTES" =~ ^[0-9]+$ ]]; then
            echo "duration_minutes must be a number."
            exit 1
          fi

          if [ "$DURATION_MINUTES" -lt 1 ] || [ "$DURATION_MINUTES" -gt 355 ]; then
            echo "duration_minutes must be between 1 and 355."
            exit 1
          fi

          run_seconds=$((DURATION_MINUTES * 60))
          echo "Starting QuantScalpBot for ${DURATION_MINUTES} minutes."

          set +e
          timeout "${run_seconds}s" python run.py
          exit_code=$?
          set -e

          if [ "$exit_code" -eq 124 ]; then
            echo "QuantScalpBot reached the requested duration and stopped normally."
            exit 0
          fi

          exit "$exit_code"
